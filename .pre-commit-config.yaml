repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
        args: [api/]
      - id: pytest-unit
        name: pytest-unit
        entry: uv run pytest
        language: system
        pass_filenames: false
        args: [-v, --tb=short, tests/test_models/, tests/test_services/, tests/test_routers/, tests/test_worker/]
      - id: pytest-integration
        name: pytest-integration
        entry: uv run pytest
        language: system
        pass_filenames: false
        args: [-v, --tb=short, tests/integration/]
